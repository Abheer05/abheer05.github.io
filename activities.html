<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activities</title>
  <link rel="stylesheet" href="dropdownstyles.css">
  <link rel="icon" type="image/png" href="favicon.jpeg">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: Arial, sans-serif;
      background: url('aboutbg.gif') no-repeat center center fixed;
      background-size: cover;
      color: #fff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      position: relative;
      color: white;
      font-size: 2.5em;
      font-weight: bold;
      padding: 20px;
      border-bottom: 5px solid #f0c808;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: url('nyancat.gif');
      background-size: cover;
      background-position: center;
      z-index: 1;
    }

    .header::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 2;
    }

    .header span {
      z-index: 3;
    }

    .header .top-right-text {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 1.1em;
      font-weight: bold;
      background: linear-gradient(45deg, #d84315, #f0c808);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      z-index: 3;
      animation: float 1s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    /* Two-column layout */
    .activities-wrap {
      flex: 1;
      display: flex;
      gap: 20px;
      padding: 25px;
      min-height: 0; /* allows children to shrink and scroll instead of overflowing */
    }

    .activities-column {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: rgba(0, 0, 0, 0.9);
      border: 2px solid #d84315;
      border-radius: 10px;
      box-shadow: 0 0 12px black;
      overflow: hidden;
    }

    .column-title {
      background: #d84315;
      color: white;
      text-align: center;
      font-weight: bold;
      font-size: 1.3em;
      padding: 14px;
      flex-shrink: 0;
    }

    .column-list {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }

    /* Activity item */
    .activity-item {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(240, 200, 8, 0.3);
      border-radius: 8px;
      margin-bottom: 12px;
      overflow: hidden;
      transition: border-color 0.3s ease;
    }

    .activity-item.open {
      border-color: #f0c808;
      box-shadow: 0 0 10px rgba(240, 200, 8, 0.3);
    }

    .activity-title-row {
      padding: 14px 16px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #ffffff;
      font-weight: bold;
      font-size: 1.05em;
      text-shadow: 0 0 6px rgba(255, 255, 255, 0.25);
      transition: background 0.3s ease, color 0.3s ease;
    }

    .activity-title-row:hover {
      background: rgba(240, 200, 8, 0.08);
      color: #f0c808;
      text-shadow: 0 0 8px rgba(240, 200, 8, 0.5);
    }

    .activity-item.open .activity-title-row {
      color: #f0c808;
      text-shadow: 0 0 8px rgba(240, 200, 8, 0.5);
      border-bottom: 1px solid rgba(240, 200, 8, 0.25);
    }

    .activity-arrow {
      color: #d84315;
      transition: transform 0.3s ease;
      font-size: 0.9em;
      flex-shrink: 0;
      margin-left: 10px;
    }

    .activity-item.open .activity-arrow {
      transform: rotate(180deg);
      color: #f0c808;
    }

    .activity-details {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease;
      padding: 0 16px;
    }

    .activity-item.open .activity-details {
      max-height: 600px;
      padding: 4px 16px 18px;
    }

    .activity-subtitle {
      color: #f0c808;
      font-style: italic;
      margin-bottom: 12px;
      font-size: 0.95em;
      opacity: 0.85;
    }

    .activity-meta-box {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 18px;
      background: rgba(255, 255, 255, 0.04);
      border-left: 3px solid #d84315;
      border-radius: 4px;
      padding: 10px 14px;
      margin-bottom: 12px;
    }

    .activity-meta {
      color: #a1a1a1;
      font-size: 0.9em;
    }

    .activity-meta strong {
      color: #f0c808;
      text-transform: uppercase;
      font-size: 0.85em;
      letter-spacing: 0.5px;
      margin-right: 4px;
    }

    .activity-tag {
      display: inline-block;
      margin-bottom: 14px;
      padding: 4px 12px;
      background: #2196f3;
      color: white;
      font-size: 0.8em;
      font-weight: bold;
      border-radius: 20px;
      letter-spacing: 0.5px;
      box-shadow: 0 0 6px rgba(33, 150, 243, 0.5);
    }

    .activity-about-label {
      color: #f0c808;
      font-size: 0.85em;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
      opacity: 0.9;
    }

    .activity-about {
      color: #e0e0e0;
      line-height: 1.6;
      font-size: 0.95em;
    }

    .empty-slot {
      background: rgba(255, 255, 255, 0.03);
      border: 1px dashed rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      height: 50px;
      margin-bottom: 12px;
    }

    .footer {
      color: #d84315;
      padding: 5px;
      font-size: 1em;
      text-align: center;
      text-shadow: 0 0 0px #f27216, 0 0 2px #f27216;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <script src="nav.js"></script>

  <div class="header">
    ACTIVITIES
    <div class="top-right-text">ACTIVITIES</div>
  </div>

  <div class="activities-wrap">
    <div class="activities-column">
      <div class="column-title">Game Development Activities</div>
      <div class="column-list" id="gamedev-list"></div>
    </div>
    <div class="activities-column">
      <div class="column-title">Other Activities</div>
      <div class="column-list" id="other-list"></div>
    </div>
  </div>

  <footer class="footer">©2026, Aevious. All rights reserved.</footer>

  <script>
	  // ---- Activity data ----
	  // To add a new activity: copy a block below and fill in the fields.
	  // "category" must be "gamedev" or "other".
	  const activities = [
	  {
	  category: "gamedev",
	  title: "SAE Game Jam 2026",
	  subtitle: "1-day game jam",
	  date: "April 2026",
	  duration: "6 hours",
	  venue: "SAE Institute, London",
	  tag: "Game Jam",
	  about: "Attended game jam where artists built a level from provided asset pack by a company."
	  },
	  {
	  category: "gamedev",
	  title: "End of the Year Showcase",
	  subtitle: "Intensive Unity fundamentals workshop",
	  date: "June 2026",
	  duration: "1 days",
	  venue: "London",
	  tag: "Showcase",
	  about: "Attended a 1-day intensive showcase where students across an institution presented their work and graduated"
	  },
	  {
	  category: "gamedev",
	  title: "Rockstar North Workshop",
	  subtitle: "Talk on player data and analytics",
	  date: "November 2025",
	  duration: "2 hours",
	  venue: "Queen Mary University of London",
	  tag: "Workshop",
	  about: "A workshop by Rockstar North Studios on player data and analytics in modern AAA titles."
	  },
	  {
	  category: "other",
	  title: "Karate Grading Exam",
	  subtitle: "3rd Kyu belt examination",
	  date: "January 2026",
	  duration: "3 hours",
	  venue: "Local Dojo",
	  tag: "Sport",
	  about: "Took part in a formal grading examination for karate, demonstrating kata, sparringa and technique to advance to 3rd Kyu."
	  },
	  {
	  category: "other",
	  title: "Badminton Club Tournament",
	  subtitle: "Doubles tournament",
	  date: "April 2026",
	  duration: "3 day",
	  venue: "Rahbar Badminton Academy",
	  tag: "Sport",
	  about: "Took part in a doubles badminton tournament with the university club, competing against other local club teams and won 3rd prize"
	  },
	  {
	  category: "other",
	  title: "Anime CosCon",
	  subtitle: "Anime convention",
	  date: "September 2024",
	  duration: "1 days",
	  venue: "Nagpur",
	  tag: "Event",
	  about: "Attended a 1-day anime convention, exploring panels on animation production and enjoying the fan community and merchandise."
	  }
	  ];

	  // ---- Render logic ----
	  function renderColumn(category, containerId) {
	  const container = document.getElementById(containerId);
	  const items = activities.filter(a => a.category === category);

	  if (items.length === 0) {
	  container.innerHTML = '<div class="activity-meta" style="padding:10px;">No activities added yet.</div>';
        return;
      }

      container.innerHTML = items.map((item, index) => `
        <div class="activity-item" data-id="${category}-${index}">
          <div class="activity-title-row" onclick="toggleActivity('${category}-${index}')">
            <span>${item.title}</span>
            <span class="activity-arrow">▼</span>
          </div>
          <div class="activity-details">
            <div class="activity-subtitle">${item.subtitle || ""}</div>
            <div class="activity-meta-box">
              <div class="activity-meta"><strong>Date</strong>${item.date || "—"}</div>
              <div class="activity-meta"><strong>Duration</strong>${item.duration || "—"}</div>
              <div class="activity-meta"><strong>Venue</strong>${item.venue || "—"}</div>
            </div>
            ${item.tag ? `<div class="activity-tag">${item.tag}</div>` : ""}
            <div class="activity-about-label">About</div>
            <div class="activity-about">${item.about || ""}</div>
          </div>
        </div>
      `).join("");
    }

    let currentlyOpenId = null;

    function toggleActivity(id) {
      const el = document.querySelector(`.activity-item[data-id="${id}"]`);
      const wasOpen = el.classList.contains("open");

      // Close whatever is currently open (global single accordion)
      if (currentlyOpenId && currentlyOpenId !== id) {
        const prevEl = document.querySelector(`.activity-item[data-id="${currentlyOpenId}"]`);
        if (prevEl) prevEl.classList.remove("open");
      }

      if (wasOpen) {
        el.classList.remove("open");
        currentlyOpenId = null;
      } else {
        el.classList.add("open");
        currentlyOpenId = id;
        // Auto-scroll within this item's own panel to bring it into view
        setTimeout(() => {
          el.scrollIntoView({ behavior: "smooth", block: "nearest" });
        }, 100);
      }
    }

    renderColumn("gamedev", "gamedev-list");
    renderColumn("other", "other-list");
  </script>
</body>
</html>
